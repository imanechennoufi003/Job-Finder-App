<div class="register-container">
  <div class="register-card">
    <div class="register-header">
      <h1>Job Finder</h1>
      <p>Créez votre compte</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="register-form">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">Prénom</label>
          <input
            type="text"
            id="firstName"
            formControlName="firstName"
            class="form-control"
            placeholder="Entrez votre prénom"
            [class.is-invalid]="submitted && f['firstName'].errors"
          />
          <div *ngIf="submitted && f['firstName'].errors" class="error-message">
            Le prénom est requis
          </div>
        </div>

        <div class="form-group">
          <label for="lastName">Nom</label>
          <input
            type="text"
            id="lastName"
            formControlName="lastName"
            class="form-control"
            placeholder="Entrez votre nom"
            [class.is-invalid]="submitted && f['lastName'].errors"
          />
          <div *ngIf="submitted && f['lastName'].errors" class="error-message">
            Le nom est requis
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          class="form-control"
          placeholder="Entrez votre email"
          [class.is-invalid]="submitted && f['email'].errors"
        />
        <div *ngIf="submitted && f['email'].errors" class="error-message">
          <span *ngIf="f['email'].errors['required']">L'email est requis</span>
          <span *ngIf="f['email'].errors['email']">Email invalide</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          class="form-control"
          placeholder="Entrez un mot de passe (minimum 6 caractères)"
          [class.is-invalid]="submitted && f['password'].errors"
        />
        <div *ngIf="submitted && f['password'].errors" class="error-message">
          <span *ngIf="f['password'].errors['required']">Le mot de passe est requis</span>
          <span *ngIf="f['password'].errors['minlength']">Minimum 6 caractères</span>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmer le mot de passe</label>
        <input
          type="password"
          id="confirmPassword"
          formControlName="confirmPassword"
          class="form-control"
          placeholder="Confirmez votre mot de passe"
          [class.is-invalid]="submitted && f['confirmPassword'].errors"
        />
        <div *ngIf="submitted && f['confirmPassword'].errors" class="error-message">
          Confirmez votre mot de passe
        </div>
      </div>

      <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

      <button type="submit" class="btn btn-primary" [disabled]="loading">
        <span *ngIf="!loading">S'inscrire</span>
        <span *ngIf="loading">Inscription en cours...</span>
      </button>
    </form>

    <div class="register-footer">
      <p>Vous avez déjà un compte? <a routerLink="/login">Se connecter</a></p>
    </div>
  </div>
</div>
